<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  /* ✅ LIGHT YELLOW BACKGROUND */
  background: linear-gradient(135deg, #fff6c9, #ffeaa7);
  color: #2b2b2b;

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* SLIDES */
.slide {
  display: none;
  text-align: center;
  max-width: 85%;
}

.active {
  display: block;
}

/* BUTTONS */
button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: #ffcc66;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* IMAGES */
img {
  max-width: 250px;
  margin-top: 20px;
  border-radius: 10px;
  display: none;
}

.show {
  display: block;
}

/* ❤️ HEART ANIMATION */
.hearts {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  top: 0;
  left: 0;
}

.hearts span {
  position: absolute;
  color: #ff4d6d;
  animation: floatUp linear infinite;
  font-size: 18px;
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- HEARTS -->
<div class="hearts" id="hearts"></div>

<!-- SLIDE 1 -->
<div class="slide active">
  <p>heyy khadejaaa…<br>
  this is for you</p>
  <button onclick="nextSlide()">start</button>
</div>

<!-- SLIDE 2 -->
<div class="slide">
  <p>Why are we not talking?</p>

  <button onclick="checkQuiz(1)">option 1</button><br>
  <button onclick="checkQuiz(2)">option 2</button><br>
  <button onclick="checkQuiz(3)">option 3</button><br>
  <button onclick="checkQuiz(4)">option 4</button>

  <p id="quizResult"></p>
</div>

<!-- SLIDE 3 -->
<div class="slide">
  <p>okay jokes aside… I just wanted to talk</p>
  <button onclick="nextSlide()">next</button>
</div>

<!-- SLIDE 4 PASSWORD -->
<div class="slide">
  <p>enter 6 digit code</p>

  <input id="passInput" maxlength="6"><br>
  <button onclick="checkPass()">enter</button>

  <p id="passResult"></p>

  <div id="teddy" style="display:none;">
    <p>🐻💛💛💛</p>
    <button onclick="nextSlide()">next</button>
  </div>
</div>

<!-- SLIDE 5 -->
<div class="slide">
  <p>you</p>
  <img id="herImg" src="her.jpg">
  <button onclick="nextSlide()">next</button>
</div>

<!-- SLIDE 6 -->
<div class="slide">
  <p>us</p>
  <img id="childImg" src="childhood.jpg">
  <button onclick="nextSlide()">next</button>
</div>

<!-- SLIDE 7 -->
<div class="slide">
  <p>
    remember I told you about a screenshot I took the previous day?
  </p>

  <button onclick="showSnap()">show</button>

  <div id="snap" style="display:none;">
    <!-- ✅ FIX: force display handling -->
    <img src="snap.jpg" style="display:block;">
    <p>that moment...</p>
    <button onclick="nextSlide()">next</button>
  </div>
</div>

<!-- SLIDE 8 -->
<div class="slide">
  <p>end</p>
</div>

<script>

let slides = document.querySelectorAll(".slide");
let current = 0;

/* SLIDES */
function nextSlide(){
  slides[current].classList.remove("active");
  current++;

  if(current >= slides.length) return;

  slides[current].classList.add("active");
}

/* QUIZ */
function checkQuiz(opt){
  let res = document.getElementById("quizResult");

  if(opt === 4){
    res.innerText = "correct";
    setTimeout(nextSlide, 800);
  } else {
    res.innerText = "wrong";
  }
}

/* PASSWORD UPDATED */
function checkPass(){
  let val = document.getElementById("passInput").value;

  if(val === "240908"){   // ✅ FIXED CODE
    document.getElementById("teddy").style.display = "block";
    document.getElementById("passResult").innerText = "";
  } else {
    document.getElementById("passResult").innerText = "wrong";
  }
}

/* SNAP FIX */
function showSnap(){
  document.getElementById("snap").style.display = "block";
}

/* HEARTS ANIMATION */
setInterval(() => {
  let h = document.createElement("span");
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "%";
  h.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.getElementById("hearts").appendChild(h);

  setTimeout(() => h.remove(), 8000);
}, 300);

</script>

</body>
</html>
